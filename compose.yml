services:
  backend:
    build: .
    # env_file: './.env'
    ports:
      - 8080:8080
    depends_on:
      - db

  db:
    image: postgres
    environment:
      POSTGRES_USER: eureka
      POSTGRES_PASSWORD: eureka
      POSTGRES_DB: eureka
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voluntree']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - eureka:/var/lib/postgresql

volumes:
  eureka:
