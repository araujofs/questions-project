spring.application.name=eureka
spring.profiles.active=dev

# Database connection settings
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/eureka}
spring.datasource.password=${DATABASE_PASSWORD:eureka}
spring.datasource.username=${DATABASE_USERNAME:eureka}
spring.jpa.hibernate.ddl-auto=update

# Session settings
server.servlet.session.timeout=8h

spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

#---
spring.config.activate.on-profile=dev

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

spring.jpa.properties.hibernate.default-schema=dev

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
