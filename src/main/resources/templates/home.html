<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@700&display=swap"
      rel="stylesheet"
    />
    <link th:href="@{/css/output.css}" rel="stylesheet" />
  </head>
  <body
    class="min-h-screen bg-[#f6f4fb] flex flex-col font-[Manrope,sans-serif] text-[#1f2430] antialiased"
  >
    <header
      class="h-16 sm:h-[72px] border-b border-[#1f24301f] bg-white px-4 sm:px-5 shadow-[0_2px_12px_rgba(31,36,48,0.04)] flex items-center justify-between"
    >
      <a th:href="@{/home}">
        <span
          class="font-[Sora,sans-serif] text-[1.2rem] sm:text-[1.35rem] font-bold lowercase tracking-[0.05em] text-[#7d3f97]"
          >eureka</span
        >
      </a>
      <div class="flex gap-2">
        <a
          th:if="${session.admin}"
          th:href="@{/race/create}"
          class="inline-flex items-center gap-2 rounded-full border border-[#7d3f97] px-4 py-2 text-[0.85rem] font-semibold text-[#7d3f97] transition hover:bg-[#7d3f97] hover:text-white"
        >
          <svg
            class="h-4 w-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>
          Nova corrida
        </a>
        <form
          th:if="${session.username}"
          th:action="@{/auth/logout}"
          method="post"
        >
          <button
            type="submit"
            class="text-md text-white font-semibold rounded-full bg-[#7d3f97] p-4 cursor-pointer"
          >
            Sair
          </button>
        </form>
      </div>
    </header>
    <main class="flex grow justify-center px-4 sm:px-6 lg:px-10 py-8 sm:py-10">
      <div class="w-full max-w-6xl">
        <div class="mb-6 sm:mb-8">
          <h1
            class="font-[Sora,sans-serif] text-[1.6rem] sm:text-[2rem] font-semibold tracking-[-0.02em] text-[#1f2430]"
          >
            Corridas disponiveis
          </h1>
          <p class="text-[0.98rem] text-[#5a6270]">
            Escolha uma corrida para participar ou explorar.
          </p>
        </div>

        <div
          th:if="${#lists.isEmpty(races)}"
          class="rounded-2xl border-2 border-dashed border-[#aab] bg-[#fbfbfd] p-8 text-center"
        >
          <p class="text-[#667085]">Ainda não há corridas cadastradas.</p>
        </div>

        <div
          th:if="${!#lists.isEmpty(races)}"
          class="grid gap-3 sm:gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"
        >
          <article
            th:each="race : ${races}"
            class="flex flex-col justify-between rounded-2xl border border-[#e6e8ee] bg-white p-5 sm:p-6 shadow-[0_10px_30px_rgba(31,36,48,0.06)] cursor-pointer transition duration-300 ease-out hover:-translate-y-1 hover:border-[#c9ced9] hover:shadow-[0_18px_40px_rgba(31,36,48,0.12)]"
          >
            <div class="flex flex-col">
              <div class="flex items-start justify-between gap-4">
                <h2
                  class="font-[Sora,sans-serif] text-[1.15rem] sm:text-[1.25rem] font-semibold text-[#1f2430]"
                  th:text="${race.title}"
                ></h2>
                <div th:if="${race.active}" class="flex items-center gap-2">
                  <span class="h-2.5 w-2.5 rounded-full bg-[#22c55e]"></span>
                  <span class="text-[0.8rem] font-semibold text-[#16a34a]"
                    >Ativa</span
                  >
                </div>
                <div th:unless="${race.active}" class="flex items-center gap-2">
                  <span class="h-2.5 w-2.5 rounded-full bg-[#f97316]"></span>
                  <span class="text-[0.8rem] font-semibold text-[#ea580c]"
                    >Inativa</span
                  >
                </div>
              </div>

              <p
                class="mt-3 text-[0.95rem] leading-relaxed text-[#4a5261] line-clamp-3"
                th:text="${race.description}"
              ></p>
            </div>
            <div
              class="mt-5 flex grow justify-between items-center gap-3 text-[0.9rem] text-[#3f4552]"
            >
              <span
                class="inline-flex items-center gap-2 rounded-full bg-[#f1f3f7] px-3 py-1"
              >
                <span class="h-2 w-2 rounded-full bg-[#7d3f97]"></span>
                <span th:text="${race.duration} + ' min'"></span>
              </span>

              <div th:if="${session.admin}" class="flex justify-end gap-2">
                <a th:href="@{/race/delete/{id}(id=${race.id})}"
                  ><button
                    class="rounded-xl p-1.5 cursor-pointer border border-red-500 text-red-500 bg-red-50"
                  >
                    Apagar
                  </button></a
                >

                <a th:href="@{/question/add(raceId=${race.id})}">
                  <button
                    class="rounded-xl p-1.5 cursor-pointer border border-indigo-500 text-indigo-500 bg-indigo-50"
                  >
                    Perguntas
                  </button></a
                >

                <a th:href="@{/race/edit/{id}(id=${race.id})}">
                  <button
                    class="rounded-xl p-1.5 cursor-pointer border border-purple-500 text-purple-500 bg-purple-50"
                  >
                    Editar
                  </button></a
                >
              </div>
            </div>
          </article>
        </div>
      </div>
    </main>
    <footer
      th:if="${session.username}"
      class="w-full mb-0 flex justify-end p-4"
    >
      <div class="p-4 rounded-full bg-white text-xl font-semibold">
        Conectado como:
        <span class="text-[#7d3f97]">[[${session.username}]]</span>
      </div>
    </footer>
  </body>
</html>
