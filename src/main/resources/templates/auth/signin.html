<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar | Eureka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@700&display=swap"
      rel="stylesheet"
    />
    <link th:href="@{/css/output.css}" rel="stylesheet" />
  </head>
  <body
    class="min-h-screen bg-[#f6f4fb] font-[Manrope,sans-serif] text-[#1f2430] antialiased"
  >
    <header th:insert="~{home.html :: header}"></header>
    <main
      class="min-h-[calc(100vh-64px)] sm:min-h-[calc(100vh-72px)] flex items-center justify-center px-[0.9rem] py-[1.4rem] sm:px-4 sm:py-8"
    >
      <section
        class="w-full max-w-[430px] rounded-[20px] border border-[#1f243014] bg-white p-6 sm:p-8 shadow-[0_14px_28px_rgba(31,36,48,0.1)]"
        aria-label="Formulario de login"
      >
        <h1
          class="m-0 text-[1.9rem] font-extrabold leading-tight text-[#7d3f97]"
        >
          Entrar
        </h1>
        <p class="mt-[0.55rem] mb-[1.7rem] text-[0.95rem] text-[#454f63]">
          Use apenas seu nome para acessar o sistema.
        </p>

        <div
          th:if="${param.error}"
          class="mb-4 rounded-[10px] border border-[#f5ca6ccc] bg-[#f5ca6c38] px-[0.85rem] py-3 text-[0.86rem] text-[#6f4a05]"
        >
          Usuário não encontrado!
        </div>

        <form
          th:action="@{/signin}"
          method="post"
          th:object="${authBody}"
          class="space-y-0"
        >
          <label for="name" class="mb-[0.55rem] block text-[0.92rem] font-bold"
            >Nome</label
          >
          <input
            name="username"
            type="text"
            autocomplete="username"
            placeholder="Digite seu nome"
            required
            class="w-full rounded-xl border border-[#1f243033] bg-white px-[0.95rem] py-[0.85rem] text-[0.98rem] transition-[border-color,box-shadow] duration-200 ease-out placeholder:text-[#667085] focus:border-[#43bf8a] focus:outline-none focus:ring-[3px] focus:ring-[#6cf5ba47]"
          />
          <input type="hidden" name="password" value="" />
          <p class="mt-[0.4rem] text-[0.8rem] text-[#2b6c53]">
            Dica: use o nome cadastrado para entrar.
          </p>
          <button
            type="submit"
            class="mt-[1.1rem] w-full cursor-pointer rounded-xl border-0 bg-[#bf5de4] px-4 py-[0.85rem] text-[0.98rem] font-extrabold tracking-[0.02em] text-white transition-all duration-200 ease-out hover:-translate-y-px hover:bg-[#ab49d2] hover:shadow-[0_10px_22px_rgba(208,108,245,0.32)]"
          >
            Entrar
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
